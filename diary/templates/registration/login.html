{% extends "diary/base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="card">
    <h2 class="page-title">ログイン</h2>

    {% if form.errors %}
        <p class="message error">ユーザー名またはパスワードが正しくありません。</p>
    {% endif %}

    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}
        <div class="actions">
            <button type="submit" class="button">ログインする</button>
            <a class="button" href="{% url 'diary:signup' %}">新規登録へ</a>
            <a class="button secondary-button" href="{% url 'diary:entry_list' %}">一覧に戻る</a>
        </div>
    </form>
</div>
{% endblock %}
