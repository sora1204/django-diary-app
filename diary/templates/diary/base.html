{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}日記アプリ{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'diary/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">
                <a href="{% url 'diary:entry_list' %}">日記アプリ</a>
            </h1>
            <nav class="site-nav">
                <a href="{% url 'diary:entry_list' %}">一覧</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'diary:entry_create' %}">新規作成</a>

                    <form action="{% url 'logout' %}" method="post" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="nav-button">ログアウト</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">ログイン</a>
                    <a href="{% url 'diary:signup' %}">新規登録</a>
                {% endif %}

                <a href="/admin/">管理画面</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% if messages %}
            <ul class="message-list">
                {% for message in messages %}
                    <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
